name: Sync upstream Base docs

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  diff-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone upstream Base repos
        run: |
          git clone --depth 1 https://github.com/base/base.git /tmp/base-src
          git clone --depth 1 https://github.com/base/docs.git /tmp/docs-src

      - name: Snapshot upstream tree state
        id: snapshot
        run: |
          mkdir -p .upstream-state
          {
            echo "## Upstream snapshot"
            echo
            echo "Generated $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "### base/base @ $(git -C /tmp/base-src rev-parse --short HEAD)"
            echo
            (cd /tmp/base-src && find docs -type f \( -name '*.md' -o -name '*.mdx' \) | sort | xargs -I{} sh -c 'printf "%s  %s\n" "$(sha1sum {} | cut -d" " -f1)" "{}"')
            echo
            echo "### base/docs @ $(git -C /tmp/docs-src rev-parse --short HEAD)"
            echo
            (cd /tmp/docs-src && find docs/base-chain -type f \( -name '*.md' -o -name '*.mdx' \) | sort | xargs -I{} sh -c 'printf "%s  %s\n" "$(sha1sum {} | cut -d" " -f1)" "{}"')
            echo
            echo "### blog.base.dev (paragraph RSS)"
            echo
            python3 .github/scripts/rss-snapshot.py "https://api.paragraph.com/blogs/rss/@blog.base.dev"
            echo
            echo "### status.base.org (statuspage RSS)"
            echo
            python3 .github/scripts/rss-snapshot.py "https://base-l2.statuspage.io/history.rss"
          } > .upstream-state/snapshot.txt

      - name: Diff against committed snapshot
        id: diff
        run: |
          if [ ! -f .upstream-state/last-sync.txt ]; then
            echo "no prior snapshot — first run"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            cp .upstream-state/snapshot.txt .upstream-state/last-sync.txt
            echo "(first run — no prior snapshot to diff against)" > .upstream-state/diff.txt
          elif ! diff -q .upstream-state/last-sync.txt .upstream-state/snapshot.txt > /dev/null; then
            echo "changes detected"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            diff -u .upstream-state/last-sync.txt .upstream-state/snapshot.txt > .upstream-state/diff.txt || true
            cp .upstream-state/snapshot.txt .upstream-state/last-sync.txt
          else
            echo "no upstream changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open paraphrase PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/upstream-sync
          commit-message: "chore: refresh upstream snapshot"
          title: "chore: upstream Base sources changed — re-paraphrase needed"
          body: |
            One or more upstream sources changed since the last sync:

            - `base/base` (docs)
            - `base/docs` (docs)
            - `blog.base.dev` (paragraph RSS)
            - `status.base.org` (statuspage RSS)

            See `.upstream-state/diff.txt` for the line-level diff. A maintainer (or Claude) should:

            1. Inspect the changed upstream entries (file hashes for docs, item guids for RSS).
            2. Re-paraphrase impacted BaseHub pages, preserving every technical fact verbatim (addresses, RPC params, hex, code blocks, constants).
            3. Update or add pages under `src/content/docs/` as needed.
            4. Squash this PR with the content edits.

            Snapshot generated by `.github/workflows/sync-upstream.yml`.
          add-paths: |
            .upstream-state/last-sync.txt
            .upstream-state/diff.txt
